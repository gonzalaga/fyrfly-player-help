<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Offline | Fyrfly Player Help</title>
  <meta name="theme-color" content="#f2b15d">
  <link rel="icon" href="assets/remix8-logo.png">
  <style>
    :root {
      color-scheme: light;
      --ink: oklch(16% 0.012 245);
      --muted: oklch(43% 0.026 245);
      --paper: oklch(98% 0.006 87);
      --line: oklch(82% 0.019 87);
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      background:
        linear-gradient(90deg, oklch(92% 0.045 74 / 0.55) 0 1px, transparent 1px 100%),
        linear-gradient(180deg, oklch(92% 0.045 74 / 0.45) 0 1px, transparent 1px 100%),
        var(--paper);
      background-size: 32px 32px;
      font-family: Avenir Next, Avenir, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif;
      line-height: 1.5;
    }

    main {
      width: min(680px, 100%);
    }

    img {
      width: min(220px, 70vw);
      height: auto;
      display: block;
      margin-bottom: 26px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.7rem, 10vw, 6rem);
      line-height: 0.92;
      letter-spacing: 0;
    }

    p {
      max-width: 54ch;
      color: var(--muted);
      font-size: 1.05rem;
    }

    a {
      color: inherit;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <main>
    <img src="assets/remix8-logo.png" alt="Remix8">
    <h1>Fyrfly Help is offline</h1>
    <p>The FAQ could not refresh because this device is offline. Reconnect to load the latest support answers, or return to the cached FAQ page if it was opened on this device before.</p>
    <p><a href="/">Return to FAQ</a></p>
  </main>
</body>
</html>
